version: '3.8'

services:
  web:
    build: .
    container_name: papex-web
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=/app/instance/papex.db
      # PostgreSQL (agar DB_TYPE=postgresql bo'lsa)
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=papex
      - PG_USER=papex
      - PG_PASSWORD=${PG_PASSWORD:-papex_secret}
      # TMDB
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - TMDB_LANGUAGE=uz-UZ
      # AI
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gpt-3.5-turbo}
      # Site
      - SITE_NAME=PAPEX
      - SITE_URL=${SITE_URL:-https://example.com}
      - SITE_DESCRIPTION=PAPEX — Movies, Anime & Entertainment
      # Scheduler
      - SCHEDULER_ENABLED=true
      - AUTO_IMPORT_ENABLED=true
      # Ads
      - ADS_ENABLED=${ADS_ENABLED:-false}
      - ADSENSE_ID=${ADSENSE_ID:-}
    volumes:
      - papex-data:/app/instance
      - papex-backups:/app/backups
      - papex-cache:/app/static/cache
    depends_on:
      - postgres
    networks:
      - papex-network

  postgres:
    image: postgres:16-alpine
    container_name: papex-postgres
    restart: always
    environment:
      - POSTGRES_DB=papex
      - POSTGRES_USER=papex
      - POSTGRES_PASSWORD=${PG_PASSWORD:-papex_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - papex-network
    profiles:
      - postgresql

  nginx:
    image: nginx:alpine
    container_name: papex-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - papex-cache:/app/static:ro
    depends_on:
      - web
    networks:
      - papex-network
    profiles:
      - production

volumes:
  papex-data:
  papex-backups:
  papex-cache:
  postgres-data:

networks:
  papex-network:
    driver: bridge
